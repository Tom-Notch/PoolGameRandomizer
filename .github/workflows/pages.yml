---
name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

# Least-privilege token plus the OIDC id-token the Pages deploy needs.
permissions:
    contents: read
    pages: write
    id-token: write

# One deploy at a time; let an in-progress production deploy finish.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
            - name: Run unit tests
              run: node --test

    deploy:
        needs: test # never publish a broken build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/configure-pages@v5
            - name: Package the static site
              uses: actions/upload-pages-artifact@v3
              with:
                  path: .
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
