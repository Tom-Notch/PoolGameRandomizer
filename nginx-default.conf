server {
    listen 80;
    server_name localhost;

    # Root deployment: serve the app directly at /
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Sub-path deployment: serve the app under /pgr
    # ^~ ensures prefix match takes priority over regex locations
    location ^~ /pgr/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /pgr/index.html;
    }

    # Redirect /pgr to /pgr/
    location = /pgr {
        return 301 /pgr/;
    }

    # Cache static assets under root path
    location ~* ^/(?!pgr/).*\.(css|js|json|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
